<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS Sentinel | Enterprise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root { --bg: #030712; --accent: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glow-button { transition: all 0.3s ease; box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        .glow-button:hover { box-shadow: 0 0 20px 2px rgba(59, 130, 246, 0.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [activeAgent, setActiveAgent] = useState(-1);
            const [inputs, setInputs] = useState({ soc: 0.82, soh: 0.95, temp: 32, current: 5.2 });

            const agents = [
                { name: "Predictor", icon: "cpu" },
                { name: "Simulator", icon: "activity" },
                { name: "Meta-Agent", icon: "git-branch" },
                { name: "Kill-Switch", icon: "shield-alert" }
            ];

            const runSimulation = async () => {
                setLoading(true);
                // Pipeline Animation
                for(let i=0; i<4; i++) {
                    setActiveAgent(i);
                    await new Promise(r => setTimeout(r, 400));
                }

                try {
                    const response = await fetch("/predict", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify(inputs)
                    });
                    const data = await response.json();
                    
                    if(data.status === "success") {
                        setResult(data);
                        setHistory(prev => [...prev, { 
                            time: new Date().toLocaleTimeString().slice(3, 8), 
                            temp: data.temperature, 
                            soc: data.soc * 100 
                        }].slice(-15));
                    } else {
                        alert("Pipeline Error: " + data.message);
                    }
                } catch (e) {
                    alert("Connection to BMS Backend failed. Check if server is running.");
                } finally {
                    setLoading(false);
                    setActiveAgent(-1);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1600px] mx-auto">
                    <nav className="flex justify-between items-center mb-10 px-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                                <i data-lucide="zap" className="text-white w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight">SENTINEL <span className="text-blue-500 text-xs font-mono">v3.1.0</span></h1>
                                <p className="text-[10px] text-gray-500 uppercase tracking-[0.2em]">Autonomous Battery Intelligence</p>
                            </div>
                        </div>
                        <button onClick={() => window.print()} className="p-2 hover:bg-white/5 rounded-lg transition">
                            <i data-lucide="download" className="w-5 h-5 text-gray-400"></i>
                        </button>
                    </nav>

                    <div className="grid lg:grid-cols-12 gap-6">
                        {/* INPUTS */}
                        <div className="lg:col-span-3 space-y-6">
                            <motion.div initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} className="glass-panel p-6 rounded-[24px]">
                                <h3 className="text-sm font-semibold mb-6 flex items-center gap-2">
                                    <i data-lucide="sliders" className="w-4 h-4 text-blue-500"></i> Telemetry Input
                                </h3>
                                {Object.keys(inputs).map((key) => (
                                    <div key={key} className="mb-5">
                                        <div className="flex justify-between mb-2 uppercase text-[10px] text-gray-500 font-bold">
                                            <label>{key}</label>
                                            <span className="text-blue-400">{inputs[key]}</span>
                                        </div>
                                        <input 
                                            type="range" min="0" max={key === 'temp' ? '100' : key === 'current' ? '20' : '1'} step="0.01"
                                            value={inputs[key]}
                                            onChange={(e) => setInputs({...inputs, [key]: parseFloat(e.target.value)})}
                                            className="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-blue-500"
                                        />
                                    </div>
                                ))}
                                <button onClick={runSimulation} disabled={loading} className="glow-button w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-sm mt-4 transition-all">
                                    {loading ? "INITIALIZING..." : "RUN ANALYSIS"}
                                </button>
                            </motion.div>

                            <div className="glass-panel p-6 rounded-[24px] space-y-4">
                                <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Active Pipeline</h3>
                                {agents.map((agent, i) => (
                                    <div key={i} className={`flex items-center gap-4 p-3 rounded-xl transition-all ${activeAgent === i ? 'bg-blue-500/20 border border-blue-500/30' : 'opacity-40'}`}>
                                        <div className={`p-2 rounded-lg ${activeAgent === i ? 'bg-blue-500 text-white' : 'bg-gray-800 text-gray-400'}`}>
                                            <i data-lucide={agent.icon} className="w-4 h-4"></i>
                                        </div>
                                        <p className="text-xs font-bold">{agent.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* CENTER: MAIN VISUAL */}
                        <div className="lg:col-span-6 space-y-6">
                            <motion.div layout className="glass-panel p-8 rounded-[32px] min-h-[400px] flex items-center justify-center">
                                {!result ? (
                                    <div className="text-center">
                                        <i data-lucide="database" className="w-12 h-12 text-gray-800 mx-auto mb-4 animate-pulse"></i>
                                        <p className="text-gray-500">Waiting for data...</p>
                                    </div>
                                ) : (
                                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="w-full">
                                        <div className="flex justify-between mb-8">
                                            <div>
                                                <span className={`px-3 py-1 rounded-full text-[10px] font-bold ${result.decision === 'SAFE' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                                    {result.decision}
                                                </span>
                                                <h2 className="text-4xl font-bold mt-4">{result.reason}</h2>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-4xl font-bold text-blue-500">{(result.confidence * 100).toFixed(0)}%</div>
                                                <div className="text-[10px] text-gray-500 uppercase tracking-tighter">Confidence</div>
                                            </div>
                                        </div>
                                        <div className="h-[250px] w-full">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={history}>
                                                    <defs><linearGradient id="color" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.3}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/></linearGradient></defs>
                                                    <XAxis dataKey="time" hide />
                                                    <YAxis hide />
                                                    <Tooltip contentStyle={{ background: '#111', border: 'none' }} />
                                                    <Area type="monotone" dataKey="temp" stroke="#3b82f6" fillOpacity={1} fill="url(#color)" />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </motion.div>
                                )}
                            </motion.div>
                        </div>

                        {/* RIGHT: STATE */}
                        <div className="lg:col-span-3 space-y-6">
                            <div className="glass-panel p-6 rounded-[24px]">
                                <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Diagnostics</h3>
                                {[{ l: 'SOC', v: result?.soc }, { l: 'SOH', v: result?.soh }, { l: 'TEMP', v: result?.temperature }].map((d, i) => (
                                    <div key={i} className="mb-4 bg-white/5 p-4 rounded-xl">
                                        <p className="text-[10px] text-gray-500">{d.l}</p>
                                        <p className="text-2xl font-bold">{d.v ? d.v.toFixed(2) : '--'}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
