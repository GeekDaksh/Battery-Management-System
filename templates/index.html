<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS Pro | Battery Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;
        const { motion } = FramerMotion;

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [chartData, setChartData] = useState([]);
            const [inputs, setInputs] = useState({ soc: 0.85, soh: 0.92, temp: 28, current: 1.5 });

            const handleDownload = () => {
                const element = document.getElementById('report-area');
                html2canvas(element, { backgroundColor: '#000', scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `BMS-Report-${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            };

            const runAnalysis = async () => {
                setLoading(true);
                // Simulated API call for demo (Replace with your actual fetch)
                setTimeout(() => {
                    const mockRes = {
                        decision: inputs.temp > 45 ? "RISK" : "SAFE",
                        reason: inputs.temp > 45 ? "Thermal Runaway Detected" : "Nominal Operating State",
                        confidence: 0.98,
                        soc: inputs.soc,
                        soh: inputs.soh,
                        temperature: inputs.temp,
                        policy_id: 102
                    };
                    setResult(mockRes);
                    // Add to chart history
                    setChartData(prev => [...prev, { name: new Date().toLocaleTimeString(), temp: inputs.temp, soc: inputs.soc * 100 }].slice(-10));
                    setLoading(false);
                }, 800);
            };

            return (
                <div className="min-h-screen p-6 md:p-12">
                    {/* Header */}
                    <header className="max-w-6xl mx-auto flex justify-between items-center mb-12">
                        <h1 className="text-2xl font-semibold tracking-tighter">BMS <span className="text-blue-500">INTELLIGENCE</span></h1>
                        {result && (
                            <button onClick={handleDownload} className="glass px-5 py-2 rounded-full text-sm font-medium hover:bg-white/10 transition">
                                Download Report ↓
                            </button>
                        )}
                    </header>

                    <div id="report-area" className="max-w-6xl mx-auto grid md:grid-cols-12 gap-8">
                        {/* Control Panel */}
                        <div className="md:col-span-4 space-y-6">
                            <div className="glass p-8 rounded-[32px]">
                                <h2 className="text-neutral-400 text-xs uppercase tracking-widest mb-6 font-bold">Telemetry Input</h2>
                                {Object.keys(inputs).map(key => (
                                    <div key={key} className="mb-4">
                                        <label className="block text-xs text-neutral-500 mb-2 uppercase">{key}</label>
                                        <input 
                                            type="number" step="0.01" value={inputs[key]}
                                            onChange={(e) => setInputs({...inputs, [key]: parseFloat(e.target.value)})}
                                            className="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-3 focus:outline-none focus:border-blue-500 transition"
                                        />
                                    </div>
                                ))}
                                <button onClick={runAnalysis} className="w-full bg-blue-600 py-4 rounded-2xl font-bold mt-4 hover:bg-blue-500 transition">
                                    {loading ? "Analysing..." : "Run AI Pipeline"}
                                </button>
                            </div>
                        </div>

                        {/* Analysis & Charts */}
                        <div className="md:col-span-8 space-y-8">
                            {result && (
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="glass p-8 rounded-[32px]">
                                    <div className="flex justify-between items-center mb-8">
                                        <div>
                                            <span className={`text-xs font-bold px-3 py-1 rounded-full ${result.decision === 'SAFE' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                                                {result.decision}
                                            </span>
                                            <h2 className="text-3xl font-semibold mt-3">{result.reason}</h2>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-4xl font-light">{(result.confidence * 100).toFixed(0)}%</p>
                                            <p className="text-[10px] text-neutral-500 uppercase tracking-widest">Confidence Score</p>
                                        </div>
                                    </div>

                                    {/* Chart Section */}
                                    <div className="h-[300px] w-full mt-12">
                                        <h3 className="text-xs text-neutral-500 uppercase mb-4 tracking-widest">Live Performance Tracking</h3>
                                        <ResponsiveContainer width="100%" height="100%">
                                            <LineChart data={chartData}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#222" vertical={false} />
                                                <XAxis dataKey="name" hide />
                                                <YAxis stroke="#444" fontSize={12} />
                                                <Tooltip contentStyle={{ background: '#111', border: '1px solid #333', borderRadius: '12px' }} />
                                                <Line type="monotone" dataKey="temp" stroke="#3b82f6" strokeWidth={3} dot={false} />
                                                <Line type="monotone" dataKey="soc" stroke="#10b981" strokeWidth={3} dot={false} />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </motion.div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
