<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS · Battery Intelligence Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg:       #050810;
            --surface:  #0c1120;
            --border:   rgba(99,179,237,0.12);
            --accent:   #3b9eff;
            --accent2:  #00e5c0;
            --danger:   #ff4d6d;
            --warn:     #ffc857;
            --text:     #e8f0fe;
            --muted:    #4a5568;
            --mono:     'Space Mono', monospace;
            --display:  'Syne', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--display);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(59,158,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,158,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow orbs */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 600px 400px at 10% 20%, rgba(59,158,255,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 500px 300px at 90% 80%, rgba(0,229,192,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        #root { position: relative; z-index: 1; }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,158,255,0.4), transparent);
        }

        /* Custom range slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 4px;
            background: rgba(99,179,237,0.15);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px rgba(59,158,255,0.6);
            cursor: pointer;
            transition: transform 0.15s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
        input[type=range]::-moz-range-thumb {
            width: 16px; height: 16px; border: none;
            border-radius: 50%; background: var(--accent);
            box-shadow: 0 0 12px rgba(59,158,255,0.6);
            cursor: pointer;
        }

        /* Gauge arc */
        .gauge-track { fill: none; stroke: rgba(99,179,237,0.1); stroke-width: 8; }
        .gauge-fill  { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1); }

        /* Pulse dot */
        @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.8); } }
        .pulse { animation: pulse 2s infinite; }

        /* Scan line */
        @keyframes scan { 0% { top: -2px; } 100% { top: 100%; } }
        .scan-line {
            position: absolute; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(59,158,255,0.6), transparent);
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        /* Fade in result */
        @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .slide-up { animation: slideUp 0.5s cubic-bezier(.4,0,.2,1) forwards; }

        /* Status badge */
        .badge-safe   { background:rgba(0,229,192,0.1); color:#00e5c0; border:1px solid rgba(0,229,192,0.25); }
        .badge-danger { background:rgba(255,77,109,0.1); color:#ff4d6d; border:1px solid rgba(255,77,109,0.25); }

        /* Loader bars */
        @keyframes bar { 0%,100% { transform:scaleY(0.4); } 50% { transform:scaleY(1); } }
        .loader-bar { display:inline-block; width:3px; height:18px; background:var(--accent); border-radius:2px; margin:0 2px; }
        .loader-bar:nth-child(1) { animation: bar 0.9s ease-in-out infinite 0.0s; }
        .loader-bar:nth-child(2) { animation: bar 0.9s ease-in-out infinite 0.15s; }
        .loader-bar:nth-child(3) { animation: bar 0.9s ease-in-out infinite 0.30s; }
        .loader-bar:nth-child(4) { animation: bar 0.9s ease-in-out infinite 0.45s; }
        .loader-bar:nth-child(5) { animation: bar 0.9s ease-in-out infinite 0.60s; }

        .mono { font-family: var(--mono); }
    </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Arc Gauge ── */
const ArcGauge = ({ value, max = 1, color = '#3b9eff', label, unit = '' }) => {
    const r = 54, cx = 64, cy = 64;
    const startAngle = -220, sweepAngle = 260;
    const toRad = d => d * Math.PI / 180;
    const pct = Math.min(Math.max(value / max, 0), 1);
    const circumference = r * toRad(sweepAngle);
    const offset = circumference * (1 - pct);

    const arcPath = (angle1, angle2) => {
        const a1 = toRad(angle1), a2 = toRad(angle2);
        const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
        const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
        const large = sweepAngle > 180 ? 1 : 0;
        return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
    };

    return (
        <div style={{ textAlign: 'center' }}>
            <svg width="128" height="128" viewBox="0 0 128 128">
                <path className="gauge-track" d={arcPath(startAngle, startAngle + sweepAngle)} />
                <path
                    className="gauge-fill"
                    d={arcPath(startAngle, startAngle + sweepAngle)}
                    stroke={color}
                    strokeDasharray={circumference}
                    strokeDashoffset={offset}
                    style={{ filter: `drop-shadow(0 0 6px ${color}88)` }}
                />
                <text x="64" y="60" textAnchor="middle" fill={color}
                      style={{ fontFamily: "'Space Mono',monospace", fontSize: '16px', fontWeight: 700 }}>
                    {(value * (max === 1 ? 100 : 1)).toFixed(max === 1 ? 0 : 1)}
                </text>
                <text x="64" y="76" textAnchor="middle" fill="rgba(255,255,255,0.3)"
                      style={{ fontFamily: "'Space Mono',monospace", fontSize: '9px' }}>
                    {max === 1 ? '%' : unit}
                </text>
            </svg>
            <p style={{ fontFamily: "'Syne',sans-serif", fontSize: '10px', fontWeight: 700,
                        letterSpacing: '0.15em', color: 'rgba(255,255,255,0.4)', marginTop: '-8px' }}>
                {label}
            </p>
        </div>
    );
};

/* ── Sparkline ── */
const Sparkline = ({ data }) => {
    if (!data || data.length < 2) return (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center',
                      height:'100%', color:'var(--muted)', fontSize:'12px', fontFamily:'var(--mono)' }}>
            NO DATA YET
        </div>
    );

    const W = 500, H = 100, P = 10;
    const vals = data.map(d => d.temp);
    const min = Math.min(...vals) - 0.5, max = Math.max(...vals) + 0.5;
    const range = max - min || 1;
    const px = i  => P + (i / (data.length - 1)) * (W - P * 2);
    const py = v  => H - P - ((v - min) / range) * (H - P * 2);
    const pts = data.map((d, i) => `${px(i)},${py(d.temp)}`).join(' ');
    const fill = `${P},${H - P} ` + pts + ` ${px(data.length-1)},${H - P}`;

    return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="100%" preserveAspectRatio="none">
            <defs>
                <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stopColor="#3b9eff" stopOpacity="0.3"/>
                    <stop offset="100%" stopColor="#3b9eff" stopOpacity="0"/>
                </linearGradient>
            </defs>
            <polygon points={fill} fill="url(#sg)" />
            <polyline points={pts} fill="none" stroke="#3b9eff" strokeWidth="2.5"
                      strokeLinejoin="round" strokeLinecap="round"
                      style={{ filter:'drop-shadow(0 0 4px #3b9eff88)' }}/>
            {data.map((d, i) => (
                <circle key={i} cx={px(i)} cy={py(d.temp)} r="3.5"
                        fill="#3b9eff" style={{ filter:'drop-shadow(0 0 4px #3b9effcc)' }}/>
            ))}
        </svg>
    );
};

/* ── Stat Card ── */
const StatCard = ({ label, value, unit, color = '#3b9eff', icon }) => (
    <div className="panel" style={{ padding:'20px 24px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
            <div>
                <p style={{ fontFamily:'var(--mono)', fontSize:'9px', letterSpacing:'0.15em',
                            color:'var(--muted)', marginBottom:'8px' }}>{label}</p>
                <p style={{ fontFamily:'var(--mono)', fontSize:'22px', fontWeight:700, color }}>
                    {value}<span style={{ fontSize:'11px', marginLeft:'4px', color:'var(--muted)' }}>{unit}</span>
                </p>
            </div>
            <div style={{ width:'36px', height:'36px', borderRadius:'10px', display:'flex',
                          alignItems:'center', justifyContent:'center',
                          background:`${color}18`, border:`1px solid ${color}30`, fontSize:'16px' }}>
                {icon}
            </div>
        </div>
    </div>
);

/* ── Slider Input ── */
const SliderInput = ({ label, value, min, max, step, onChange, unit }) => {
    const pct = ((value - min) / (max - min)) * 100;
    return (
        <div style={{ marginBottom:'24px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'10px', alignItems:'center' }}>
                <span style={{ fontFamily:'var(--mono)', fontSize:'10px', letterSpacing:'0.12em',
                               color:'rgba(255,255,255,0.4)', fontWeight:700 }}>{label}</span>
                <span style={{ fontFamily:'var(--mono)', fontSize:'13px', color:'var(--accent)',
                               fontWeight:700, background:'rgba(59,158,255,0.08)',
                               padding:'2px 10px', borderRadius:'6px', border:'1px solid rgba(59,158,255,0.2)' }}>
                    {value}{unit}
                </span>
            </div>
            <div style={{ position:'relative' }}>
                <div style={{
                    position:'absolute', top:'50%', left:0, transform:'translateY(-50%)',
                    height:'4px', width:`${pct}%`, background:'var(--accent)',
                    borderRadius:'2px', pointerEvents:'none',
                    boxShadow:'0 0 8px rgba(59,158,255,0.5)'
                }}/>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={e => onChange(parseFloat(e.target.value))} />
            </div>
        </div>
    );
};

/* ── Main App ── */
const App = () => {
    const [inputs, setInputs] = useState({ soc: 0.85, soh: 0.92, temp_C: 28, current: 4.5 });
    const [loading, setLoading]   = useState(false);
    const [result,  setResult]    = useState(null);
    const [history, setHistory]   = useState([]);
    const [error,   setError]     = useState(null);
    const [key,     setKey]       = useState(0);
    const [time,    setTime]      = useState(new Date());

    useEffect(() => {
        const t = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(t);
    }, []);

    const set = (k, v) => setInputs(p => ({ ...p, [k]: v }));

    const runAnalysis = async () => {
        setLoading(true); setError(null);
        try {
            const res  = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(inputs),
            });
            const data = await res.json();
            if (data.status === 'success') {
                setResult(data); setKey(k => k + 1);
                setHistory(h => [...h, {
                    time: new Date().toLocaleTimeString().slice(0, 5),
                    temp: data.temperature,
                }].slice(-14));
            } else {
                setError(data.message || 'Pipeline error');
            }
        } catch (e) { setError('Network error: ' + e.message); }
        finally { setLoading(false); }
    };

    const safe = result?.decision === 'SAFE';

    return (
        <div style={{ maxWidth:'1400px', margin:'0 auto', padding:'28px 28px' }}>

            {/* ── TOP NAV ── */}
            <header style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'32px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:'16px' }}>
                    <div style={{
                        width:'48px', height:'48px', borderRadius:'14px',
                        background:'linear-gradient(135deg, #1a3a6e, #0c1e40)',
                        border:'1px solid rgba(59,158,255,0.3)',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        boxShadow:'0 0 24px rgba(59,158,255,0.2)'
                    }}>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                             stroke="#3b9eff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <rect x="2" y="7" width="18" height="11" rx="2"/>
                            <path d="M22 11v3"/>
                            <path d="M7 7V5a2 2 0 0 1 4 0v2"/>
                        </svg>
                    </div>
                    <div>
                        <h1 style={{ fontFamily:'var(--display)', fontSize:'20px', fontWeight:800,
                                     letterSpacing:'-0.02em', lineHeight:1 }}>
                            Battery Management System
                        </h1>
                        <p style={{ fontFamily:'var(--mono)', fontSize:'9px', color:'var(--muted)',
                                    letterSpacing:'0.1em', marginTop:'4px' }}>
                            INTELLIGENT CELL ANALYTICS · AI PIPELINE v3
                        </p>
                    </div>
                </div>

                <div style={{ display:'flex', alignItems:'center', gap:'20px' }}>
                    <span style={{ fontFamily:'var(--mono)', fontSize:'11px', color:'var(--muted)' }}>
                        {time.toLocaleTimeString()}
                    </span>
                    <div style={{ display:'flex', alignItems:'center', gap:'8px',
                                  background:'rgba(0,229,192,0.07)', border:'1px solid rgba(0,229,192,0.2)',
                                  padding:'8px 16px', borderRadius:'100px' }}>
                        <span className="pulse" style={{ width:'7px', height:'7px', borderRadius:'50%',
                                                          background:'var(--accent2)', display:'inline-block' }}/>
                        <span style={{ fontFamily:'var(--mono)', fontSize:'10px', color:'var(--accent2)',
                                       fontWeight:700, letterSpacing:'0.1em' }}>
                            SYSTEM ONLINE
                        </span>
                    </div>
                </div>
            </header>

            {/* ── MAIN GRID ── */}
            <div style={{ display:'grid', gridTemplateColumns:'340px 1fr', gap:'20px', alignItems:'start' }}>

                {/* ── LEFT COLUMN ── */}
                <div style={{ display:'flex', flexDirection:'column', gap:'20px' }}>

                    {/* Input Panel */}
                    <div className="panel" style={{ padding:'28px' }}>
                        <div className="scan-line"/>
                        <p style={{ fontFamily:'var(--mono)', fontSize:'9px', letterSpacing:'0.2em',
                                    color:'var(--muted)', marginBottom:'24px', fontWeight:700 }}>
                            ◈ INPUT TELEMETRY
                        </p>

                        <SliderInput label="STATE OF CHARGE" value={inputs.soc}
                            min={0} max={1} step={0.01} unit=""
                            onChange={v => set('soc', v)} />
                        <SliderInput label="STATE OF HEALTH" value={inputs.soh}
                            min={0} max={1} step={0.01} unit=""
                            onChange={v => set('soh', v)} />
                        <SliderInput label="TEMPERATURE" value={inputs.temp_C}
                            min={-20} max={80} step={0.5} unit="°C"
                            onChange={v => set('temp_C', v)} />
                        <SliderInput label="CURRENT" value={inputs.current}
                            min={0} max={20} step={0.1} unit="A"
                            onChange={v => set('current', v)} />

                        <button
                            onClick={runAnalysis}
                            disabled={loading}
                            style={{
                                width:'100%', padding:'16px', marginTop:'8px',
                                background: loading
                                    ? 'rgba(59,158,255,0.1)'
                                    : 'linear-gradient(135deg, #1a5fff, #0d3bcc)',
                                border: '1px solid rgba(59,158,255,0.4)',
                                borderRadius:'12px',
                                color:'white', fontFamily:'var(--mono)', fontSize:'12px',
                                fontWeight:700, letterSpacing:'0.12em',
                                cursor: loading ? 'not-allowed' : 'pointer',
                                boxShadow: loading ? 'none' : '0 0 32px rgba(59,158,255,0.25)',
                                transition:'all 0.2s',
                                display:'flex', alignItems:'center', justifyContent:'center', gap:'10px'
                            }}
                        >
                            {loading ? (
                                <>
                                    <span className="loader-bar"/><span className="loader-bar"/>
                                    <span className="loader-bar"/><span className="loader-bar"/>
                                    <span className="loader-bar"/>
                                </>
                            ) : (
                                <>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                         stroke="currentColor" strokeWidth="2.5">
                                        <polygon points="5 3 19 12 5 21 5 3"/>
                                    </svg>
                                    RUN AI PIPELINE
                                </>
                            )}
                        </button>

                        {error && (
                            <div style={{ marginTop:'16px', padding:'14px 16px', borderRadius:'10px',
                                          background:'rgba(255,77,109,0.08)', border:'1px solid rgba(255,77,109,0.25)',
                                          color:'#ff4d6d', fontFamily:'var(--mono)', fontSize:'11px',
                                          lineHeight:'1.6' }}>
                                ⚠ {error}
                            </div>
                        )}
                    </div>

                    {/* Input summary cards */}
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
                        <StatCard label="SOC INPUT" value={(inputs.soc*100).toFixed(0)} unit="%" color="#3b9eff" icon="⚡"/>
                        <StatCard label="SOH INPUT" value={(inputs.soh*100).toFixed(0)} unit="%" color="#00e5c0" icon="🔬"/>
                        <StatCard label="TEMP" value={inputs.temp_C} unit="°C" color="#ffc857" icon="🌡"/>
                        <StatCard label="CURRENT" value={inputs.current} unit="A" color="#b06cff" icon="⚙"/>
                    </div>
                </div>

                {/* ── RIGHT COLUMN ── */}
                <div style={{ display:'flex', flexDirection:'column', gap:'20px' }}>

                    {!result ? (
                        <div className="panel" style={{
                            minHeight:'500px', display:'flex', flexDirection:'column',
                            alignItems:'center', justifyContent:'center', gap:'16px'
                        }}>
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
                                 stroke="rgba(99,179,237,0.2)" strokeWidth="1.5">
                                <rect x="2" y="7" width="18" height="11" rx="2"/>
                                <path d="M22 11v3"/><path d="M7 7V5a2 2 0 0 1 4 0v2"/>
                            </svg>
                            <p style={{ fontFamily:'var(--mono)', fontSize:'11px',
                                        color:'var(--muted)', letterSpacing:'0.15em' }}>
                                {loading ? 'RUNNING NEURAL PIPELINE…' : 'AWAITING DATA STREAM'}
                            </p>
                        </div>
                    ) : (
                        <div key={key} className="slide-up" style={{ display:'flex', flexDirection:'column', gap:'20px' }}>

                            {/* Decision Banner */}
                            <div className="panel" style={{ padding:'28px 32px', position:'relative', overflow:'hidden' }}>
                                <div style={{
                                    position:'absolute', top:0, left:0, bottom:0, width:'4px',
                                    background: safe ? 'var(--accent2)' : 'var(--danger)',
                                    boxShadow: `0 0 20px ${safe ? 'var(--accent2)' : 'var(--danger)'}`
                                }}/>
                                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                                    <div>
                                        <span className={safe ? 'badge-safe' : 'badge-danger'}
                                              style={{ fontFamily:'var(--mono)', fontSize:'10px', fontWeight:700,
                                                       letterSpacing:'0.15em', padding:'5px 14px', borderRadius:'100px' }}>
                                            {result.decision}
                                        </span>
                                        <h2 style={{ fontFamily:'var(--display)', fontSize:'26px', fontWeight:800,
                                                     marginTop:'12px', letterSpacing:'-0.02em',
                                                     color: safe ? 'var(--accent2)' : 'var(--danger)' }}>
                                            {result.reason}
                                        </h2>
                                        <p style={{ fontFamily:'var(--mono)', fontSize:'10px', color:'var(--muted)',
                                                    marginTop:'8px', letterSpacing:'0.08em' }}>
                                            POLICY ID: {result.policy_id} &nbsp;·&nbsp; {new Date().toLocaleString()}
                                        </p>
                                    </div>
                                    <div style={{ textAlign:'center' }}>
                                        <div style={{ fontFamily:'var(--mono)', fontSize:'48px', fontWeight:700,
                                                      color: safe ? 'var(--accent2)' : 'var(--danger)',
                                                      lineHeight:1,
                                                      textShadow: `0 0 30px ${safe ? 'rgba(0,229,192,0.4)' : 'rgba(255,77,109,0.4)'}` }}>
                                            {(result.confidence * 100).toFixed(0)}
                                            <span style={{ fontSize:'18px' }}>%</span>
                                        </div>
                                        <p style={{ fontFamily:'var(--mono)', fontSize:'9px', color:'var(--muted)',
                                                    letterSpacing:'0.15em', marginTop:'6px' }}>
                                            CONFIDENCE
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* Gauges Row */}
                            <div className="panel" style={{ padding:'28px' }}>
                                <p style={{ fontFamily:'var(--mono)', fontSize:'9px', letterSpacing:'0.2em',
                                            color:'var(--muted)', marginBottom:'20px', fontWeight:700 }}>
                                    ◈ OUTPUT METRICS
                                </p>
                                <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'16px' }}>
                                    <ArcGauge value={result.soc}         max={1}   color="#3b9eff"  label="SOC"  />
                                    <ArcGauge value={result.soh}         max={1}   color="#00e5c0"  label="SOH"  />
                                    <ArcGauge value={result.temperature} max={80}  color="#ffc857"  label="TEMP" unit="°C"/>
                                </div>
                            </div>

                            {/* Chart */}
                            <div className="panel" style={{ padding:'28px' }}>
                                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px' }}>
                                    <p style={{ fontFamily:'var(--mono)', fontSize:'9px', letterSpacing:'0.2em',
                                                color:'var(--muted)', fontWeight:700 }}>
                                        ◈ TEMPERATURE HISTORY
                                    </p>
                                    <span style={{ fontFamily:'var(--mono)', fontSize:'9px', color:'var(--accent)',
                                                   background:'rgba(59,158,255,0.08)', padding:'3px 10px',
                                                   borderRadius:'6px', border:'1px solid rgba(59,158,255,0.2)' }}>
                                        {history.length} READINGS
                                    </span>
                                </div>
                                <div style={{ height:'120px' }}>
                                    <Sparkline data={history}/>
                                </div>
                            </div>

                            {/* Detail cards */}
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'14px' }}>
                                <StatCard label="OUTPUT SOC"  value={(result.soc * 100).toFixed(1)}    unit="%" color="#3b9eff"  icon="⚡"/>
                                <StatCard label="OUTPUT SOH"  value={(result.soh * 100).toFixed(1)}    unit="%" color="#00e5c0"  icon="🔬"/>
                                <StatCard label="TEMPERATURE" value={result.temperature.toFixed(2)}    unit="°C" color="#ffc857" icon="🌡"/>
                            </div>

                        </div>
                    )}
                </div>
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
