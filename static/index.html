<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMS Sentinel | Enterprise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #030712; color: #fff; margin: 0; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [activeStep, setActiveStep] = useState(-1);
            const [inputs, setInputs] = useState({ soc: 0.85, soh: 0.92, temp: 28, current: 4.5 });

            // Initialize Lucide Icons
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [result, loading]);

            const runAnalysis = async () => {
                setLoading(true);
                for(let i=0; i<4; i++) {
                    setActiveStep(i);
                    await new Promise(r => setTimeout(r, 400));
                }

                try {
                    const response = await fetch("/predict", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify(inputs)
                    });
                    const data = await response.json();
                    if(data.status === "success") {
                        setResult(data);
                        setHistory(prev => [...prev, { time: new Date().toLocaleTimeString().slice(3, 8), temp: data.temperature }].slice(-10));
                    }
                } catch (e) { console.error(e); } 
                finally { setLoading(false); setActiveStep(-1); }
            };

            return (
                <div className="min-h-screen p-8 max-w-7xl mx-auto">
                    {/* Header */}
                    <nav className="flex justify-between items-center mb-12">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-500/20">
                                <i data-lucide="zap" className="text-white w-7 h-7"></i>
                            </div>
                            <h1 className="text-2xl font-bold tracking-tight uppercase">Sentinel <span className="text-blue-500 text-xs font-mono ml-2">v3</span></h1>
                        </div>
                        <div className="text-[10px] font-bold text-green-500 bg-green-500/10 px-4 py-2 rounded-full border border-green-500/20">SYSTEM ONLINE</div>
                    </nav>

                    <div className="grid lg:grid-cols-12 gap-8">
                        {/* LEFT PANEL */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass p-8 rounded-[32px]">
                                <h3 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-8 text-center">Telemetry</h3>
                                {Object.keys(inputs).map((key) => (
                                    <div key={key} className="mb-6">
                                        <div className="flex justify-between mb-2 text-[10px] font-bold uppercase text-gray-500">
                                            <label>{key}</label>
                                            <span className="text-blue-400">{inputs[key]}</span>
                                        </div>
                                        <input 
                                            type="range" min="0" max={key === 'temp' ? '100' : key === 'current' ? '20' : '1'} step="0.01"
                                            value={inputs[key]}
                                            onChange={(e) => setInputs({...inputs, [key]: parseFloat(e.target.value)})}
                                            className="w-full accent-blue-500"
                                        />
                                    </div>
                                ))}
                                <button onClick={runAnalysis} disabled={loading} className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-sm mt-4 shadow-lg shadow-blue-600/20">
                                    {loading ? "INITIALIZING..." : "RUN AI PIPELINE"}
                                </button>
                            </div>
                        </div>

                        {/* RIGHT PANEL */}
                        <div className="lg:col-span-8">
                            <AnimatePresence mode="wait">
                                {!result ? (
                                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="h-full glass rounded-[40px] flex items-center justify-center text-gray-600">
                                        <p>Ready for Data Stream</p>
                                    </motion.div>
                                ) : (
                                    <motion.div initial={{ opacity: 0, scale: 0.98 }} animate={{ opacity: 1, scale: 1 }} className="glass p-10 rounded-[40px] h-full">
                                        <div className="flex justify-between mb-10">
                                            <div>
                                                <span className={`px-3 py-1 rounded-full text-[10px] font-bold ${result.decision === 'SAFE' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                                    {result.decision}
                                                </span>
                                                <h2 className="text-4xl font-bold mt-4 leading-tight">{result.reason}</h2>
                                            </div>
                                            <div className="text-center bg-white/5 p-6 rounded-3xl border border-white/5">
                                                <div className="text-5xl font-bold text-blue-500">{(result.confidence * 100).toFixed(0)}%</div>
                                                <div className="text-[10px] text-gray-500 mt-2">CONFIDENCE</div>
                                            </div>
                                        </div>
                                        
                                        <div className="h-[250px] w-full bg-black/20 rounded-3xl p-6 border border-white/5">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={history}>
                                                    <XAxis dataKey="time" hide />
                                                    <YAxis hide />
                                                    <Tooltip contentStyle={{ background: '#111', border: 'none', borderRadius: '12px' }} />
                                                    <Area type="monotone" dataKey="temp" stroke="#3b82f6" fillOpacity={0.1} strokeWidth={4} />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>

                                        <div className="grid grid-cols-3 gap-6 mt-10">
                                            {[{l: 'SOC', v: result.soc}, {l: 'SOH', v: result.soh}, {l: 'TEMP', v: result.temperature}].map((s, i) => (
                                                <div key={i} className="bg-white/5 p-5 rounded-2xl border border-white/5 text-center">
                                                    <p className="text-[10px] text-gray-500 mb-2 uppercase">{s.l}</p>
                                                    <p className="text-2xl font-bold text-gray-200">{s.v.toFixed(3)}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
